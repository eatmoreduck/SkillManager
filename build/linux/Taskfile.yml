version: '3'

includes:
  common: ../Taskfile.yml

vars:
  PACKAGE_NAME: 'skillmanager'
  APP_VERSION: '{{.VERSION | default (env "VERSION") | default "0.0.0"}}'
  APP_ARCH: '{{.ARCH | default (env "ARCH") | default "amd64"}}'

tasks:
  build:
    summary: Builds the application for Linux
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          PRODUCTION: '{{.PRODUCTION | default "false"}}'
      - task: common:generate:icons
    cmds:
      - go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}
    vars:
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{else}}-buildvcs=false -gcflags=all="-l"{{end}}'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      PRODUCTION: '{{.PRODUCTION | default "false"}}'

  package:
    summary: Packages a production build of the application for Linux
    deps:
      - task: build
        vars:
          PRODUCTION: 'true'
    cmds:
      - task: create:appimage
      - task: create:deb
      - task: create:rpm

  create:appimage:
    summary: Creates an AppImage
    dir: build/linux/appimage
    deps:
      - task: build
        vars:
          PRODUCTION: 'true'
      - task: generate:dotdesktop
    cmds:
      - cp {{.APP_BINARY}} {{.APP_NAME}}
      - cp ../../../frontend/src/assets/logo.png appicon.png
      - bash build.sh
      - mv {{.APP_NAME}}.AppImage ../../../bin/{{.APP_NAME}}-{{.APP_VERSION}}-linux-{{.APP_ARCH}}.AppImage
      - rm -f {{.APP_NAME}}
      - rm -rf {{.APP_NAME}}.AppDir
    vars:
      APP_NAME: '{{.APP_NAME}}'
      APP_BINARY: '../../../bin/{{.APP_NAME}}'
    env:
      APP_NAME: '{{.APP_NAME}}'
      APP_BINARY: '../../../bin/{{.APP_NAME}}'
      DESKTOP_FILE: '../{{.APP_NAME}}.desktop'
      ICON_PATH: 'appicon.png'

  create:deb:
    summary: Creates a Debian package
    deps:
      - task: build
        vars:
          PRODUCTION: 'true'
      - task: generate:dotdesktop
    cmds:
      - wails3 tool package -name "{{.PACKAGE_NAME}}" -format deb -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      GOARCH: '{{.APP_ARCH}}'
      VERSION: '{{.APP_VERSION}}'

  create:rpm:
    summary: Creates an RPM package
    deps:
      - task: build
        vars:
          PRODUCTION: 'true'
      - task: generate:dotdesktop
    cmds:
      - wails3 tool package -name "{{.PACKAGE_NAME}}" -format rpm -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      GOARCH: '{{.APP_ARCH}}'
      VERSION: '{{.APP_VERSION}}'

  generate:dotdesktop:
    summary: Generates a `.desktop` file
    dir: build
    cmds:
      - mkdir -p {{.ROOT_DIR}}/build/linux/appimage
      - wails3 generate .desktop -name "{{.APP_NAME}}" -exec "{{.EXEC}}" -icon "{{.ICON}}" -outputfile "{{.ROOT_DIR}}/build/linux/{{.APP_NAME}}.desktop" -categories "{{.CATEGORIES}}"
    vars:
      EXEC: '{{.APP_NAME}}'
      ICON: 'skillmanager'
      CATEGORIES: 'Development;Utility;'

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'
