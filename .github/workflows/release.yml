name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev rpm

      - name: Install Windows build dependencies
        if: matrix.label == 'windows'
        shell: powershell
        run: choco install nsis -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Build release packages
        shell: bash
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails3 task package

      - name: Collect release files (macOS)
        if: matrix.label == 'macos'
        shell: bash
        run: |
          mkdir -p release
          cp bin/SkillManager.dmg "release/SkillManager-macos-${RUNNER_ARCH}.dmg"
          ditto -c -k --sequesterRsrc --keepParent bin/SkillManager.app "release/SkillManager-macos-${RUNNER_ARCH}.app.zip"

      - name: Collect release files (Linux)
        if: matrix.label == 'linux'
        shell: bash
        run: |
          mkdir -p release
          cp bin/*.AppImage release/
          cp bin/*.deb release/
          cp bin/*.rpm release/

      - name: Collect release files (Windows)
        if: matrix.label == 'windows'
        shell: bash
        run: |
          mkdir -p release
          cp bin/*.exe release/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
