name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20.20.1'
  WAILS_VERSION: 'v3.0.0-alpha.74'
  TARGET_ARCH: 'amd64'
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task darwin:package

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/SkillManager-*-macos-${{ env.TARGET_ARCH }}.dmg
          fail_on_unmatched_files: true

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task windows:package

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/SkillManager-*-windows-${{ env.TARGET_ARCH }}-installer.exe
          fail_on_unmatched_files: true

  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task linux:package

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/SkillManager-*-linux-${{ env.TARGET_ARCH }}.AppImage
            bin/skillmanager_*.deb
            bin/skillmanager-*.rpm
          fail_on_unmatched_files: true
