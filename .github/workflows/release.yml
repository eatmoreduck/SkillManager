name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20.20.1'
  WAILS_VERSION: 'v3.0.0-alpha.74'
  TARGET_ARCH: 'amd64'
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task darwin:package

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: bin/SkillManager-*-macos-${{ env.TARGET_ARCH }}.dmg
          if-no-files-found: error

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Add NSIS to PATH
        shell: pwsh
        run: |
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          $chocoBin = "C:\ProgramData\chocolatey\bin"
          if (-not (Test-Path (Join-Path $nsisPath "makensis.exe"))) {
            throw "makensis.exe not found in $nsisPath"
          }
          $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          if (Test-Path $chocoBin) {
            $chocoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Verify NSIS
        shell: pwsh
        run: |
          where.exe makensis
          makensis /VERSION

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task windows:package

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: bin/SkillManager-*-windows-${{ env.TARGET_ARCH }}-installer.exe
          if-no-files-found: error

  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        shell: bash
        run: echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build and Package
        env:
          ARCH: ${{ env.TARGET_ARCH }}
        run: wails3 task linux:package

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            bin/SkillManager-*-linux-${{ env.TARGET_ARCH }}.AppImage
            bin/skillmanager_*.deb
            bin/skillmanager-*.rpm
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [release-macos, release-windows, release-linux]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh --version
          gh release view "${{ env.RELEASE_TAG }}" --json tagName,isDraft,isImmutable,url

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ env.RELEASE_TAG }}" release-assets/* --clobber
